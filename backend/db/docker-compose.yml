services:
  postgres:
    image: postgres:16
    container_name: backend-postgres
    networks:
      - devtest-container-stack_default
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demosutdb
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

networks:
  devtest-container-stack_default:
    external: true