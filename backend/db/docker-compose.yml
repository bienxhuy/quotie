services:
  postgres:
    image: postgres:16
    networks:
      - akiro-persist-containers_default
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demosutdb
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

networks:
  devtest-container-stack_default:
    external: true
